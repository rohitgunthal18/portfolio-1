<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Rohit Gunthal — Terminal Portfolio</title>
  <meta name="description" content="Terminal-style interactive portfolio of Rohit Balasaheb Gunthal." />
  <!-- Relative paths so the app works at any depth (e.g. /cli/cli.html). -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!--
    Pure Linux-style CLI surface.
      #terminal        : full-screen, scrollable terminal surface (click focuses input).
      #terminal-output : rendered command output + echoed input lines.
      #input-line      : the live prompt + text input + blinking cursor.
    The prompt flows directly beneath the latest output, just like a real shell.
    There is no surrounding chrome, except one subtle link to the GUI portfolio
    for visitors who prefer a traditional website.
  -->

  <!-- Subtle escape hatch to the full GUI portfolio (for non-terminal users). -->
  <a
    id="gui-link"
    class="gui-link"
    href="https://rohitgunthal.is-a.dev/"
    target="_blank"
    rel="noopener noreferrer"
    title="Open the full graphical portfolio website"
  >&#9783; GUI Portfolio &#8599;</a>

  <div id="terminal" class="terminal" role="region" aria-label="Interactive terminal">
    <div id="terminal-output" class="terminal-output" aria-live="polite"></div>

    <div id="input-line" class="input-line">
      <label id="prompt" class="prompt" for="terminal-input"></label>
      <span class="input-wrap">
        <textarea
          id="terminal-input"
          class="terminal-input"
          rows="1"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Terminal command input"
        ></textarea>
        <span id="cursor" class="cursor" aria-hidden="true"></span>
      </span>
    </div>
  </div>

  <!-- Entry point loaded as an ES module (no build step required). -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
